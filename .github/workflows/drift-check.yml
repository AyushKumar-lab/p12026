name: Monthly Drift Check

on:
  schedule:
    # 1st of every month at 6:00 AM UTC (11:30 AM IST)
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target column for label drift (e.g. success_12m). Leave empty to skip.'
        required: false
        default: ''
      features:
        description: 'Comma-separated feature columns to monitor. Empty = all numeric.'
        required: false
        default: ''

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/ml_requirements.txt

      - name: Install dependencies
        run: pip install -r backend/ml_requirements.txt

      - name: Run drift report
        id: drift
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.target }}" ]; then
            ARGS="$ARGS --target ${{ github.event.inputs.target }}"
          fi
          if [ -n "${{ github.event.inputs.features }}" ]; then
            ARGS="$ARGS --features \"${{ github.event.inputs.features }}\""
          fi
          python backend/run_drift_report.py $ARGS
        continue-on-error: true

      - name: Upload drift reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-report-${{ github.run_id }}
          path: artifacts/drift_reports/
          retention-days: 90

      - name: Check drift severity
        if: steps.drift.outcome == 'failure'
        run: |
          echo "::warning::Drift detected above threshold — review artifacts/drift_reports/ and consider retraining."
          echo "Run: python backend/train_baseline_lightgbm.py --export-dir artifacts/models/current --model-version vX.Y.Z"
